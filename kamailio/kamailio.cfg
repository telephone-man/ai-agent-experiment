#!KAMAILIO

####### Global Parameters ########
log_facility=LOG_LOCAL0
children=4
log_stderror=yes
debug={{KAMAILIO_DEBUG_LEVEL}}
tcp_connection_lifetime=3605
tcp_max_connections=2048
tcp_accept_no_cl=yes
http_reply_parse=yes
enable_sctp=no
# traffic DNATed from Docker
listen=udp:{{KAMAILIO_LISTEN_IP}}:{{KAMAILIO_EXTERNAL_SIP_PORT}} advertise {{KAMAILIO_ADVERTISED_IP}}:{{KAMAILIO_EXTERNAL_ADVERTISED_PORT}} name "docker_external_udp"
listen=tcp:{{KAMAILIO_LISTEN_IP}}:{{KAMAILIO_EXTERNAL_SIP_PORT}} advertise {{KAMAILIO_ADVERTISED_IP}}:{{KAMAILIO_EXTERNAL_ADVERTISED_PORT}} name "docker_external_tcp"
listen=tcp:{{KAMAILIO_LISTEN_IP}}:{{KAMAILIO_EXTERNAL_WEBRTC_PORT}} advertise {{KAMAILIO_ADVERTISED_IP}}:{{KAMAILIO_EXTERNAL_WEBRTC_PORT}} name "docker_external_tcp_webrtc"

# traffic from docker subnet
listen=udp:{{KAMAILIO_LOCAL_IP}}:{{KAMAILIO_INTERNAL_SIP_PORT}} name "docker_internal_udp"
listen=tcp:{{KAMAILIO_LOCAL_IP}}:{{KAMAILIO_INTERNAL_SIP_PORT}} name "docker_internal_tcp"
listen=tcp:{{KAMAILIO_LOCAL_IP}}:{{KAMAILIO_INTERNAL_WEBRTC_PORT}} name "docker_internal_tcp_webrtc"

# Local demo aliases used by SIP.js and host-loopback review paths.
# Kamailio supports repeated alias parameters for hostnames/IPs this server owns.
alias="voice.local"
alias="localhost"
alias="127.0.0.1"

#!define FREESWITCH_ADDRESS "sip:freeswitch:5080"
#!trydef DBURL "postgres://KAMAILIO_DB_RO_USER:KAMAILIO_DB_RO_PASS@kamailio_db/kamailio"
#!define FLB_NATB 6
#!define FLB_NATSIPPING 7
#!define MULTIDOMAIN 0
#!define FLT_RTPENGINE_FAIL 11

####### Modules Section ########
include_file "config/modules-load.cfg"
include_file "config/modules-params.cfg"

####### Routing Logic ########
request_route {
    # All SIP requests (INVITE, REGISTER, OPTIONS, etc.) start here
    xlog("L_INFO", "Request Method: $rm from $si:$sp to request uri: $ru\n");
    if ({{KAMAILIO_SIP_BODY_LOGGING}} == 1 && is_method("INVITE")) {
       xlog("L_INFO", "$rm received:\n$mb\n");
    }
    xlog("L_INFO", "Received on: IP $Ri | Port $Rp\n");
    xlog("L_INFO", "Received on: ADVERTISED ip $RAi | Port $RAp\n");
    xlog("L_INFO", "Call-ID: $ci | CSeq: $cs | To: $tu | From: $fu\n");
    xlog("L_INFO", "User-Agent: $hdr(User-Agent)\n");

    # route(HANDLE_WS_NAT) -> config/routes-webrtc.cfg
    route(HANDLE_WS_NAT);

    # route(HANDLE_RETRANSMISSIONS) -> config/routes-request-helpers.cfg
    if (route(HANDLE_RETRANSMISSIONS)) {
        exit;
    }
    xlog("L_INFO", "REQUEST_ROUTE: past retransmission checks for $rm $ci\n");

    # route(HANDLE_OPTIONS_KEEPALIVE) -> config/routes-request-helpers.cfg
    if (is_method("OPTIONS") && !has_totag()) {
        route(HANDLE_OPTIONS_KEEPALIVE);
        exit;
    }

    # route(HANDLE_CANCEL) -> config/routes-request-helpers.cfg
    if (is_method("CANCEL")) {
        route(HANDLE_CANCEL);
        exit;
    }

    # route(HANDLE_STATEFUL_ACK) -> config/routes-request-helpers.cfg
    if (is_method("ACK") && t_check_trans()) {
        route(HANDLE_STATEFUL_ACK);
        exit;
    }

    # Bunch of routine checks
    # 1. Check for malformed SIP messages
    # 2. Check for flood attacks
    # route(REQINIT) -> config/routes-request-helpers.cfg
    route(REQINIT);
    xlog("L_INFO", "REQUEST_ROUTE: passed REQINIT for $rm $ci\n");

    # Annotate caller transport for media handling.
    if (is_method("INVITE") && !has_totag()) {
        # route(MARK_WEBRTC) -> config/routes-webrtc.cfg
        route(MARK_WEBRTC);
    }

    # Handle REGISTER requests.
    if (is_method("REGISTER")) {
        xlog("L_INFO", "REQUEST_ROUTE: entering REGISTER branch for $tu from $si:$sp\n");
        if (!route(REGISTRAR)) {
            exit;
        }
        exit;
    }

    # If the packet has a 'totag'
    # then it is a dialog request like a BYE or ACK
    # and we need to check if the dialog exists
    # If it does not exist, send a 403
    if (has_totag()) {
        if (loose_route()) { # is the route header safe for us to process?
            if (!is_known_dlg()) {
                dlg_db_load_callid("$ci");
                if (!is_known_dlg()) {
                    sl_send_reply("481", "Call/Transaction Does Not Exist");
                    xlog("L_ERR", "No dialog found in memory or DB for call-id $ci\n");
                    exit;
                }
            }
            dlg_manage(); # update status of the dialog
            route(WITHINDLG); 
            exit;
        }else{
            sl_send_reply("403", "Forbidden");
            xlog("L_ERR", "Loose route failed\n");
            exit;
        }
    }

    # Handle INVITE and other dialog-forming requests
    if (is_method("INVITE|SUBSCRIBE")) {
        route(SIPOUT);
        exit;
    }

    # Default routing
    sl_send_reply("500", "No route around");
    exit;
}
# config/routes-request-helpers.cfg:
#   REQINIT, HANDLE_RETRANSMISSIONS, HANDLE_OPTIONS_KEEPALIVE,
#   HANDLE_CANCEL, HANDLE_STATEFUL_ACK, event_route[sipdump:msg]
include_file "config/routes-request-helpers.cfg"
# config/routes-webrtc.cfg:
#   HANDLE_WS_NAT, MARK_WEBRTC, TRACK_WS_DIALOG,
#   event_route[xhttp:request], event_route[websocket:closed]
include_file "config/routes-webrtc.cfg"
# config/routes-registration.cfg:
#   REGISTRAR, TOREGISTERED
include_file "config/routes-registration.cfg"
# config/routes-outbound.cfg:
#   TOFREESWITCH, SIPOUT, ORIGIN_CLASSIFY, ALIAS_IF_PRESENT
include_file "config/routes-outbound.cfg"
# config/routes-dialog-media.cfg:
#   RTPENGINE_SET_SELECT, WITHINDLG, WITHINDLG_REPLY, RELAY,
#   NATMANAGE_*, MEDIAMANAGE_*, BRANCH_MEDIA, MANAGE_MEDIA_REPLY_*,
#   failure_route[MANAGE_FAILURE]
include_file "config/routes-dialog-media.cfg"
