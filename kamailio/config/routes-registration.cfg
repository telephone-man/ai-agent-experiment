route[REGISTRAR] {
    xlog("L_INFO", "REGISTRAR: start aor=$tu contact=$(ct{nameaddr.uri}) src=$si:$sp proto=$proto\n");
    if ($proto == "WS" || $proto == "WSS" || $proto == "ws" || $proto == "wss") {
        setbflag(FLB_NATB);
        fix_nated_register();
        set_contact_alias();
    } else if (nat_uac_test("19")) {
        setbflag(FLB_NATB);
        fix_nated_register();
        set_contact_alias();
    }

    xlog("L_INFO", "REGISTRAR: adding Path for aor=$tu\n");
    if (!add_path_received()) {
        xlog("L_ERR", "Failed to add Path for REGISTER\n");
        sl_send_reply("503", "Internal Path Error");
        return -1;
    }

    xlog("L_INFO", "REGISTRAR: saving location for aor=$tu\n");
    if (!save("location", "0x02")) {
        xlog("L_INFO", "Failed to save registration\n");
        sl_reply_error();
        return -1;
    }

    xlog("L_INFO", "REGISTRAR: save succeeded aor=$tu contact_host=$(ct{nameaddr.uri}{uri.host}) received=$(ct{nameaddr.uri}{param.value,received})\n");
    reg_send_reply();
    return(1);
}

route[TOREGISTERED] {
    $var(orig_ru) = $ru;

    if (!lookup("location")) {
        xlog("L_INFO", "TOREGISTERED: $var(orig_ru) is not currently registered\n");
        sl_send_reply("480", "Temporarily Unavailable");
        return(-1);
    }

    route(ALIAS_IF_PRESENT);

    $dlg_var(target_is_webrtc) = "0";
    if ($(ru{uri.transport}) =~ "^(ws|wss)$") {
        $dlg_var(target_is_webrtc) = "1";
        xlog("L_INFO", "TOREGISTERED: target contact is WebRTC (transport=$(ru{uri.transport}))\n");
    } else {
        xlog("L_INFO", "TOREGISTERED: target contact is SIP/RTP (transport=$(ru{uri.transport}))\n");
    }

    return(1);
}
