route[HANDLE_WS_NAT] {
    if (!nat_uac_test("64")) {
        # This route is called unconditionally from request_route. Returning 0
        # aborts the parent route in this runtime, which blocks non-WebSocket
        # requests from FreeSWITCH before they reach SIPOUT.
        return(1);
    }

    # Do NAT traversal stuff for requests from a WebSocket connection,
    # matching the nathelper/websocket guidance in the local docs.
    xlog("L_INFO", "WebSocket detected - applying NAT handling\n");
    force_rport();
    if (is_method("REGISTER")) {
        fix_nated_register();
    } else if (!has_totag()) {
        add_contact_alias();
    }
    return(1);
}

route[MARK_WEBRTC] {
    if (!is_method("INVITE")) {
        return;
    }

    if ($proto == "WS" || $proto == "WSS" || $proto == "ws" || $proto == "wss") {
        $dlg_var(caller_is_webrtc) = "1";
        xlog("L_INFO", "MARK_WEBRTC: caller identified as WebRTC (transport=$proto src=$si:$sp)\n");
    } else {
        $dlg_var(caller_is_webrtc) = "0";
    }
}

route[TRACK_WS_DIALOG] {
    if (!is_method("INVITE") || has_totag()) {
        return;
    }

    # Track dialogs originated by WebRTC callers against their websocket socket tuple.
    if ($dlg_var(caller_is_webrtc) == "1") {
        $var(ws_profile_key) = $si + ":" + $sp;
        if ($var(ws_profile_key) != $null && $var(ws_profile_key) != ":" && $var(ws_profile_key) != "") {
            $dlg_var(ws_profile_key) = $var(ws_profile_key);
            set_dlg_profile("ws_flow", "$var(ws_profile_key)");
            xlog("L_INFO", "TRACK_WS_DIALOG: profile=ws_flow value=$var(ws_profile_key) ci=$ci\n");
        } else {
            xlog("L_WARN", "TRACK_WS_DIALOG: websocket INVITE without valid ws_profile_key ci=$ci\n");
        }
    }
    return;
}

event_route[xhttp:request] {
    set_reply_close();
    set_reply_no_connect();

    xlog("L_DBG", "HTTP Request Received\n");

    if ($hdr(Upgrade)=~"websocket" && $hdr(Connection)=~"Upgrade" && $rm=~"GET") {
        xlog("L_DBG", "WebSocket Upgrade Request Received\n");
        if ($hdr(Host) == $null || !is_myself("sip:" + $hdr(Host))) {
            xlog("L_WARN", "Rejected WebSocket request with invalid Host '$hdr(Host)'\n");
            xhttp_reply("403", "Forbidden", "", "");
            exit;
        }
        if (ws_handle_handshake()){
            xlog("L_DBG", "WebSocket Upgrade Handshake Successful\n");
            exit;
        } else {
            xlog("L_ERR", "WebSocket Upgrade Handshake Failed\n");
            xhttp_reply("500", "Internal Server Error", "", "");
            exit;
        }
    }

    xhttp_reply("404", "Not found", "", "");
}

event_route[websocket:closed] {
    $var(ws_key) = $si + ":" + $sp;
    if (dlg_set_timeout_by_profile("ws_flow", "$var(ws_key)", "1")) {
        xlog("L_WARN", "WS closed id=$ws_conid from $si:$sp - forcing timeout for dialogs in ws_flow=$var(ws_key)\n");
    } else {
        xlog("L_INFO", "WS closed id=$ws_conid from $si:$sp - no dialogs found in ws_flow=$var(ws_key)\n");
    }
    xlog("L_INFO", "WS closed id=$ws_conid from $si:$sp\n");
}
