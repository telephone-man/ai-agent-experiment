route[TOFREESWITCH] {
    $du = FREESWITCH_ADDRESS;
    xlog("L_INFO", "TOFREESWITCH: method=$rm ci=$ci src=$si:$sp ru=$ru x_type=$hdr(X-type) du=$du\n");
    set_send_socket("udp:{{KAMAILIO_LOCAL_IP}}:{{KAMAILIO_INTERNAL_SIP_PORT}}");
    return;
}

route[SIPOUT] {
    $var(ruser) = $rU;
    $var(ruser_num) = $(var(ruser){s.numeric});
    $var(orig_ru) = $ru;
    xlog("L_INFO", "SIPOUT entry: ruser=$var(ruser) ruser_num=$var(ruser_num) orig_ru=$var(orig_ru) X-type=$hdr(X-type) src=$si:$sp\n");

    if ($var(ruser_num) == "7000") {
        xlog("L_INFO", "SIPOUT: AI assistant 7000 -> FreeSWITCH\n");
        append_hf("X-type: ai_assistant\r\n");
        route(TOFREESWITCH);
    } else if ($var(ruser_num) == "7100") {
        xlog("L_INFO", "SIPOUT: translation bridge 7100 -> FreeSWITCH\n");
        append_hf("X-type: translate_bridge\r\n");
        route(TOFREESWITCH);
    } else if ($hdr(X-type) == "to_registered") {
        xlog("L_INFO", "SIPOUT: X-type=to_registered -> registered endpoint\n");
        if (!route(TOREGISTERED)) {
            exit;
        }
    } else {
        xlog("L_ERR", "SIPOUT: no local route for $var(ruser_num)\n");
        sl_send_reply("503", "No Matching Route");
        exit;
    }

    if (is_method("INVITE")) {
        route(ORIGIN_CLASSIFY);
        xlog("L_INFO", "ORIGIN_CLASSIFY: $dlg_var(orig_internal)\n");
        if ($dlg_var(orig_internal) == "1") {
            route(NATMANAGE_INTERNAL);
            route(MEDIAMANAGE_INTERNAL);
        } else {
            route(NATMANAGE_EXTERNAL);
            route(MEDIAMANAGE_EXTERNAL);
        }

        if (has_body("application/sdp")) {
            t_on_branch("BRANCH_MEDIA");
        }
    }

    record_route();
    dlg_manage();
    route(TRACK_WS_DIALOG);
    if (is_method("INVITE")) {
        route(RTPENGINE_SET_SELECT);
    }
    if (!has_totag()) {
        route(ALIAS_IF_PRESENT);
    }
    route(RELAY);
}

route[ORIGIN_CLASSIFY] {
    $dlg_var(orig_internal) = "0";

    xlog("L_INFO", "ORIGIN_CLASSIFY: Classifying origin of request\n");
    xlog("L_INFO", "Received IP is $Ri | Port is $Rp\n");

    if (($Ri == "{{KAMAILIO_LOCAL_IP}}" && ($Rp == {{KAMAILIO_INTERNAL_SIP_PORT}} || $Rp == {{KAMAILIO_INTERNAL_WEBRTC_PORT}}))) {
        $dlg_var(orig_internal) = "1";
        return;
    }

    if (is_in_subnet(@via[0].host, "{{VOIPNET_SUBNET}}")) {
        $dlg_var(orig_internal) = "1";
        return;
    }
}

route[ALIAS_IF_PRESENT] {
    if ($(ru{uri.params}) =~ ".*;alias=.*") {
        if (!handle_ruri_alias()) {
            xlog("L_ERR", "Bad alias <$ru>\n");
            sl_send_reply("400", "Bad Request");
            exit;
        }
    }
}
