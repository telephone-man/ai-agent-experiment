route[RTPENGINE_SET_SELECT] {
    $dlg_var(rtpengine_setid) = "0";
    $avp(rtpengine_setid) = 0;
    return;
}

route[SET_RTPENGINE_EXTRA_ID] {
    if ($T_branch_idx != $null && "$T_branch_idx" != "") {
        $avp(extra_id) = $ci + $T_branch_idx;
    } else {
        $avp(extra_id) = $ci;
    }
    return;
}

route[WEBRTC_TO_BROWSER_FLAGS] {
    $var(rtp_flags) = "WebRTC via-branch=extra replace-origin replace-session-connection direction=internal direction=external";
    return;
}

route[WEBRTC_TO_FREESWITCH_FLAGS] {
    $var(rtp_flags) = "RTP/AVP replace-origin replace-session-connection ICE=remove SDES-off direction=external direction=internal";
    return;
}

route[IN_DIALOG_MEDIA_FLAGS] {
    if ($dlg_var(caller_is_webrtc) == "1" || $dlg_var(target_is_webrtc) == "1") {
        if (is_in_subnet($si, "{{VOIPNET_SUBNET}}")) {
            route(WEBRTC_TO_BROWSER_FLAGS);
        } else {
            route(WEBRTC_TO_FREESWITCH_FLAGS);
        }
    } else if ($dlg_var(orig_internal) == "1") {
        $var(rtp_flags) = "RTP/AVP replace-origin replace-session-connection direction=internal direction=external";
    } else {
        $var(rtp_flags) = "replace-origin replace-session-connection direction=external direction=internal";
    }
    return;
}

route[IN_DIALOG_REPLY_MEDIA_FLAGS] {
    if ($dlg_var(caller_is_webrtc) == "1" || $dlg_var(target_is_webrtc) == "1") {
        if (is_in_subnet($si, "{{VOIPNET_SUBNET}}")) {
            route(WEBRTC_TO_BROWSER_FLAGS);
        } else {
            route(WEBRTC_TO_FREESWITCH_FLAGS);
        }
    } else if ($dlg_var(orig_internal) == "1") {
        $var(rtp_flags) = "RTP/AVP replace-origin replace-session-connection direction=external direction=internal";
    } else {
        $var(rtp_flags) = "replace-origin replace-session-connection direction=internal direction=external";
    }
    return;
}

route[WITHINDLG] {
    if (is_method("INFO") && $hdr(Content-Type)=~"application/trickle-ice-sdpfrag") {
        xlog("L_INFO", "WITHINDLG: INFO with trickle ICE SDP fragment\n");
        route(RTPENGINE_SET_SELECT);
        if (rtpengine_info()) {
            sl_send_reply("200", "OK");
            exit;
        }
    }

    if ($(ru{uri.params}) =~ ".*;alias=.*") {
        handle_ruri_alias();
        switch ($rc) {
        case -1:
            xlog("L_ERR", "WITHINDLG: failed to handle alias of R-URI $ru\n");
            sl_send_reply("400", "Bad request");
            exit;
        case 1:
            xlog("L_INFO", "WITHINDLG: routing $rm from $fu to $du\n");
            break;
        case 2:
            xlog("L_WARN", "WITHINDLG: handle_ruri_alias no-op for $ru despite ;alias\n");
            break;
        };
    } else {
        xlog("L_INFO", "WITHINDLG: routing $rm from $fu to $ru (no alias present)\n");
    }

    if (has_body("application/sdp") && !is_method("BYE")) {
        route(RTPENGINE_SET_SELECT);
        route(SET_RTPENGINE_EXTRA_ID);
        route(IN_DIALOG_MEDIA_FLAGS);
        xlog("L_INFO", "WITHINDLG: rtpengine_manage($var(rtp_flags)) for in-dialog $rm\n");
        if (!rtpengine_manage($var(rtp_flags))) {
            xlog("L_ERR", "WITHINDLG: rtpengine_manage() failed for in-dialog $rm\n");
        }
    }

    if (is_method("BYE")) {
        route(RTPENGINE_SET_SELECT);
        if (rtpengine_query_v("j", "$var(rtp_query_json)")) {
            xlog("L_INFO", "WITHINDLG: rtpengine_query_v succeeded on BYE ci=$ci\n");
        } else {
            xlog("L_WARN", "WITHINDLG: rtpengine_query_v failed on BYE ci=$ci\n");
        }
        if (!rtpengine_manage("delete-delay=5")) {
            xlog("L_ERR", "WITHINDLG: rtpengine_manage(delete-delay=5) failed on BYE ci=$ci\n");
        }
        t_on_reply("WITHINDLG_REPLY");
        route(RELAY);
        exit;
    }

    if (is_method("ACK")) {
        route(RELAY);
        exit;
    }

    if (is_method("INVITE|UPDATE|BYE|PRACK|MESSAGE|INFO|REFER|SUBSCRIBE|NOTIFY|OPTIONS")) {
        t_on_reply("WITHINDLG_REPLY");
        route(RELAY);
        exit;
    }

    route(RELAY);
    exit;
}

onreply_route[WITHINDLG_REPLY] {
    if ($rm == "INVITE"
        && t_check_status("18[0-9]|2[0-9][0-9]")
        && (
            $(ct{nameaddr.uri}{uri.transport}) =~ "^(ws|wss)$"
            || $(ct{nameaddr.uri}{uri.host}) =~ ".*\\.invalid$"
        )) {
        xlog("L_INFO", "WITHINDLG_REPLY: WebRTC contact in reply ($ct) - adding ;alias\n");
        set_contact_alias();
    }

    if (has_body("application/sdp")) {
        route(RTPENGINE_SET_SELECT);
        route(SET_RTPENGINE_EXTRA_ID);
        route(IN_DIALOG_REPLY_MEDIA_FLAGS);
        xlog("L_INFO", "WITHINDLG_REPLY: rtpengine_manage($var(rtp_flags)) for in-dialog reply to $rm\n");
        if (!rtpengine_manage($var(rtp_flags))) {
            xlog("L_ERR", "WITHINDLG_REPLY: rtpengine_manage() failed on in-dialog reply\n");
        }
    }
}

route[RELAY] {
    if (is_method("INVITE|UPDATE")) {
        if ($dlg_var(orig_internal) == "1") {
            t_on_reply("MANAGE_MEDIA_REPLY_INTERNAL");
        } else {
            t_on_reply("MANAGE_MEDIA_REPLY_EXTERNAL");
        }
    }
    if (!t_is_set("failure_route")) {
        t_on_failure("MANAGE_FAILURE");
    }

    if (!t_relay()) {
        xlog("L_INFO", "t_relay failed\n");
        sl_reply_error();
    }
    exit;
}

route[NATMANAGE_INTERNAL] {
    if (nat_uac_test("19") && !has_totag()) {
        add_contact_alias();
    }
}

route[MEDIAMANAGE_INTERNAL] {
    xlog("L_INFO", "MEDIAMANAGE_INTERNAL: entering for $rm $ci body_len=$(rb{s.len})\n");
    if (!has_body("application/sdp")){
        xlog("L_INFO", "MEDIAMANAGE_INTERNAL: no SDP body in $rm $ci (len=$(rb{s.len})), skipping media management\n");
        return;
    }

    if ($dlg_var(target_is_webrtc) == "1") {
        $dlg_var(rtp_offer_flags) = "WebRTC replace-origin replace-session-connection direction=internal direction=external";
    } else {
        $dlg_var(rtp_offer_flags) = "RTP/AVP replace-origin replace-session-connection direction=internal direction=external";
    }

    t_on_reply("MANAGE_MEDIA_REPLY_INTERNAL");
}

route[NATMANAGE_EXTERNAL] {
    if (nat_uac_test("19") && !has_totag()) {
        add_contact_alias();
    }
}

route[MEDIAMANAGE_EXTERNAL] {
    xlog("L_INFO", "MEDIAMANAGE_EXTERNAL: entering for $rm $ci body_len=$(rb{s.len})\n");
    if (!has_body("application/sdp")) {
        xlog("L_INFO", "MEDIAMANAGE_EXTERNAL: no SDP body in $rm $ci (len=$(rb{s.len})), skipping media management\n");
        return;
    }

    if ($dlg_var(caller_is_webrtc) == "1") {
        $dlg_var(rtp_offer_flags) = "RTP/AVP replace-origin replace-session-connection ICE=remove SDES-off direction=external direction=internal";
    } else {
        $dlg_var(rtp_offer_flags) = "replace-origin replace-session-connection direction=external direction=internal";
    }

    xlog("L_INFO", "MEDIAMANAGE_EXTERNAL: caller_is_webrtc=$dlg_var(caller_is_webrtc) rtp_offer_flags=$dlg_var(rtp_offer_flags) ci=$ci\n");
    t_on_reply("MANAGE_MEDIA_REPLY_EXTERNAL");
}

branch_route[BRANCH_MEDIA] {
    if (!is_method("INVITE")) {
        return;
    }

    if (!has_body("application/sdp")) {
        xlog("L_INFO", "BRANCH_MEDIA: no SDP body in $rm $ci (len=$(rb{s.len})), skipping\n");
        return;
    }

    if ($dlg_var(rtp_offer_flags) != $null && $dlg_var(rtp_offer_flags) != "") {
        $var(rtp_flags) = $dlg_var(rtp_offer_flags);
    } else {
        $var(rtp_flags) = "replace-origin replace-session-connection";
    }

    route(RTPENGINE_SET_SELECT);
    route(SET_RTPENGINE_EXTRA_ID);
    xlog("L_INFO", "BRANCH_MEDIA: rtpengine_manage($var(rtp_flags)) caller_is_webrtc=$dlg_var(caller_is_webrtc) ci=$ci\n");
    if (!rtpengine_manage($var(rtp_flags))) {
        xlog("L_ERR", "BRANCH_MEDIA: rtpengine_manage failed\n");
        setflag(FLT_RTPENGINE_FAIL);
        t_flush_flags();
        drop();
    }
}

onreply_route[MANAGE_MEDIA_REPLY_INTERNAL] {
    xlog("L_INFO", "MANAGE_MEDIA_REPLY_INTERNAL: reply path\n");

    if ($rm == "INVITE" && t_check_status("18[0-9]|2[0-9][0-9]") && $dlg_var(target_is_webrtc) == "1") {
        set_contact_alias();
        xlog("L_INFO", "MANAGE_MEDIA_REPLY_INTERNAL: added ;alias to Contact for WebRTC target\n");
    }

    if (!has_body("application/sdp")) {
        xlog("L_INFO", "MANAGE_MEDIA_REPLY_INTERNAL: no SDP body in $rm $ci (len=$(rb{s.len})), skipping media management\n");
        return;
    }

    if ($dlg_var(target_is_webrtc) == "1") {
        $var(rtp_flags) = "RTP/AVP replace-origin replace-session-connection ICE=remove SDES-off direction=external direction=internal";
    } else {
        $var(rtp_flags) = "RTP/AVP replace-origin replace-session-connection direction=external direction=internal";
    }

    route(RTPENGINE_SET_SELECT);
    route(SET_RTPENGINE_EXTRA_ID);
    if (!rtpengine_manage($var(rtp_flags))) {
        xlog("L_ERR", "MANAGE_MEDIA_REPLY_INTERNAL: rtpengine_manage failed\n");
    }
}

onreply_route[MANAGE_MEDIA_REPLY_EXTERNAL] {
    xlog("L_INFO", "MANAGE_MEDIA_REPLY_EXTERNAL: enter rs=$rs rm=$rm caller_is_webrtc=$dlg_var(caller_is_webrtc) ci=$ci\n");

    if ($rm == "INVITE" && t_check_status("18[0-9]|2[0-9][0-9]") && $dlg_var(caller_is_webrtc) == "1") {
        set_contact_alias();
        xlog("L_INFO", "MANAGE_MEDIA_REPLY_EXTERNAL: added ;alias to Contact for WebRTC caller\n");
    }

    if (!has_body("application/sdp")){
        xlog("L_INFO", "MANAGE_MEDIA_REPLY_EXTERNAL: no SDP body in $rm $ci (len=$(rb{s.len})), skipping media management\n");
        return;
    }

    if ($dlg_var(caller_is_webrtc) == "1") {
        route(WEBRTC_TO_BROWSER_FLAGS);
    } else {
        $var(rtp_flags) = "replace-origin replace-session-connection direction=internal direction=external";
    }

    route(RTPENGINE_SET_SELECT);
    route(SET_RTPENGINE_EXTRA_ID);
    xlog("L_INFO", "MANAGE_MEDIA_REPLY_EXTERNAL: rtpengine_manage($var(rtp_flags)) extra_id=$avp(extra_id) ci=$ci\n");
    if (!rtpengine_manage($var(rtp_flags))) {
        xlog("L_ERR", "MANAGE_MEDIA_REPLY_EXTERNAL: rtpengine_manage failed\n");
    }
}

failure_route[MANAGE_FAILURE] {
    if (isflagset(FLT_RTPENGINE_FAIL)) {
        xlog("L_ERR", "MANAGE_FAILURE: media engine failure for $ci\n");
        t_reply("503", "Media engine failure");
        exit;
    }
}
