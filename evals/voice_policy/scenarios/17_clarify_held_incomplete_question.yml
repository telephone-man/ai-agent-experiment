id: clarify_held_incomplete_question
description: A held incomplete question should become a clarification prompt when the hold expires.
input:
  transcript: "Can I ask why"
  is_partial: false
  stt_confidence: 0.94
  current_flow: "assistant"
  last_agent_message: "Sure, go ahead and ask your question."
  agent_is_speaking: false
  tts_allow_interruptions: true
  clarification_due: true
  pending_action: null
  pending_action_risk: "none"
expected_semantic:
  addressed_to_agent: true
  utterance_complete: false
  clarification_needed: true
  clarification_type: "bare_why"
expected_policy:
  decision: "CLARIFY"
  safe_to_execute_tools: false
  flags:
    - "clarification_needed"
    - "bare_why"
  forbidden_decisions:
    - "WAIT"
    - "RESPOND"
    - "END_CALL"
