server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Keep the replay fixture URL canonical so relative asset paths resolve
    # from the replay-fixtures directory instead of the web root.
    location = /replay-fixtures {
        return 301 /replay-fixtures/;
    }

    # Serve checked-in browser replay fixtures from the separate mounted
    # fixture directory. `alias` replaces the matched location prefix, so
    # /replay-fixtures/example.json maps to
    # /usr/share/nginx/replay-fixtures/example.json.
    location /replay-fixtures/ {
        alias /usr/share/nginx/replay-fixtures/;
    }

    # Serve the static web client from the container image. Unknown paths
    # return 404 rather than falling back to index.html because this is a
    # file-based local demo, not an SPA router.
    location / {
        try_files $uri $uri/ =404;
    }
}
